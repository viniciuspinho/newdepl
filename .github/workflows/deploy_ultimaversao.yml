name: Deploy Docker App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    steps:
      - name: Atualizar repositório local
        run: |
          cd /home/suporte/newdepl
          git fetch origin
          git reset --hard origin/main

      - name: Mostrar commit que será implantado
        run: |
          cd /home/suporte/newdepl
          echo "Commit atual:"
          git rev-parse HEAD
          echo "Último commit:"
          git log -1 --oneline

      - name: Rebuild e subir containers
        run: |
          cd /home/suporte/newdepl
          docker compose down || true
          docker compose up -d --build

      - name: Mostrar status dos containers
        run: |
          cd /home/suporte/newdepl
          docker compose ps

      - name: Mostrar URL esperada
        run: |
          echo "Deploy finalizado. Teste no navegador ou com curl http://localhost"
